# Strict-mode rejection case: the acme sub-block sets client_id and
# token_url but is missing client_secret. The loader must reject this
# with a clear error instead of silently inheriting client_secret
# from the server level.
servers:
  default:
    host: command.example.com
    client_id: command-svc
    client_secret: command-rotate
    token_url: https://command-auth.internal/oauth/token
    acme:
      base_url: https://acme.example.com/acme-admin
      client_id: acme-svc
      # client_secret intentionally omitted
      token_url: https://acme-auth.customer.com/oauth/token
